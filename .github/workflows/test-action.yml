name: Test Action

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare fixture repo
        run: |
          set -euo pipefail

          rm -rf .tmp/repo
          mkdir -p .tmp/repo/app
          cd .tmp/repo

          git init -b main
          git config user.name "CI"
          git config user.email "ci@example.com"

          echo "## Unreleased" > app/unreleased.md
          echo "" >> app/unreleased.md
          echo "- feat: add feature" >> app/unreleased.md
          echo "image: app:v0.1.0 # update-automation:version" > app/deploy.txt

          git add .
          git commit -m "chore: initial"
          git tag v0.1.0

          echo "new" > app/new.txt
          git add app/new.txt
          git commit -m "feat: another feature"

      - name: Run wrapper in dry-run mode without tag
        id: release
        uses: ./
        env:
          GITHUB_EVENT_NAME: workflow_dispatch
        with:
          working-directory: .tmp/repo/app
          run-tag: "false"
          dry-run: "true"

      - name: Assert outputs
        run: |
          set -euo pipefail
          test "${{ steps.release.outputs.next-version }}" = "0.2.0"
          test "${{ steps.release.outputs.next-tag }}" = "v0.2.0"
          test "${{ steps.release.outputs.bump-type }}" = "minor"
